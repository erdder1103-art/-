<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#102a43"><title>釜山旅行助手 V6</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#eef6ff;--card:#fff;--ink:#17324d;--muted:#7890a8;--line:#dce9f5;--a:#5da8f5;--b:#8069ea;--good:#31b979;--danger:#e75b63}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#dff2ff,#f6f8ff);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}.app{max-width:430px;min-height:100vh;margin:auto;padding:18px 14px 92px}.hero{padding:20px;border-radius:28px;background:linear-gradient(135deg,#16496f,#2b7caa);color:#fff;box-shadow:0 14px 35px #2d70a633}.hero h1{margin:5px 0 6px;font-size:28px}.hero p{margin:0;opacity:.82;font-size:13px}.syncbar{display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px 12px;border-radius:14px;background:#ffffff1c;font-size:12px}.dot{width:9px;height:9px;border-radius:50%;background:#ffd66b}.dot.on{background:#53e39f}.panel{margin-top:14px;padding:16px;background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 8px 24px #4f729112}.row{display:flex;gap:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-top:10px}.field label{display:block;margin:0 0 6px;color:var(--muted);font-size:12px}.field input,.field select{width:100%;height:48px;border:1px solid var(--line);border-radius:14px;padding:0 14px;background:#f8fbff;color:var(--ink);font-size:15px}.primary,.secondary,.danger{border:0;border-radius:15px;font-weight:800;font-size:15px;min-height:48px;padding:0 16px}.primary{width:100%;margin-top:12px;color:#fff;background:linear-gradient(90deg,var(--a),var(--b))}.secondary{background:#eaf4ff;color:#27618d}.danger{background:#fff0f0;color:var(--danger)}h2{margin:0 0 10px;font-size:19px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sum{padding:14px;border-radius:18px;background:#eef7ff}.sum b{display:block;margin-top:7px;font-size:20px}.item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border:0}.grow{flex:1}.small{font-size:12px;color:var(--muted)}.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100%);display:grid;grid-template-columns:repeat(3,1fr);padding:9px 12px calc(9px + env(safe-area-inset-bottom));background:#ffffffed;border-top:1px solid var(--line);backdrop-filter:blur(16px)}.tabs button{border:0;background:none;color:#8497aa;font-weight:700}.tabs button.on{color:#276ea4}.view{display:none}.view.on{display:block}.modal{position:fixed;inset:0;z-index:20;background:#10233dcc;display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(430px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:28px 28px 0 0;padding:22px 16px calc(22px + env(safe-area-inset-bottom))}.close{float:right;width:38px;height:38px;border:0;border-radius:50%;font-size:20px}.choice{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.choice button{min-height:70px;border:1px solid var(--line);border-radius:18px;background:#f6faff;color:var(--ink);font-weight:800}.choice button.on{border:2px solid #6b7fea;background:#eff0ff}.code{font-size:28px;font-weight:900;letter-spacing:2px;text-align:center;padding:14px;border:2px dashed #8bb6d8;border-radius:16px;background:#eff8ff}.member{display:flex;align-items:center;gap:10px;padding:10px;border-radius:15px;background:#f6faff;margin-top:8px}.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#dfeeff}.empty{text-align:center;padding:24px 10px;color:var(--muted)}.chip{display:inline-block;padding:8px 11px;border-radius:999px;background:#edf6ff;margin:4px;border:0}.weatherbig{font-size:52px;font-weight:900}.cards{display:flex;gap:8px;overflow:auto}.hour{min-width:78px;padding:12px;border-radius:16px;background:#eff7ff;text-align:center}.recommend{padding:13px;border-radius:17px;background:#f6faff;margin-top:9px}.recommend a{display:inline-block;margin-top:8px;color:#196ba3;font-weight:800;text-decoration:none}.notice{margin-top:10px;padding:10px;border-radius:13px;background:#fff7dd;color:#8a6300;font-size:12px}.hidden{display:none!important}
</style></head><body>
<div class="app">
<section class="hero"><div class="small" style="color:#cfe9ff">BUSAN TRIP</div><h1>釜山旅行助手</h1><p>多人記帳、即時天氣、智慧交通</p><div class="syncbar" id="syncOpen"><span class="dot" id="syncDot"></span><span id="syncText">尚未加入共享旅程</span><span style="margin-left:auto">設定 ›</span></div></section>

<main id="wallet" class="view on">
<section class="panel"><div class="row" style="align-items:center"><div class="grow"><div class="small">目前旅程</div><b id="tripTitle">尚未建立旅程</b></div><button class="secondary" id="manageTrip">旅程設定</button></div><div class="notice" id="cloudNotice">建立或加入旅程後，同行者可使用同一房間碼同步記帳。</div></section>
<section class="panel"><h2>旅行總花費</h2><div class="summary"><div class="sum"><span class="small">韓元總花費</span><b id="krwTotal">₩0</b></div><div class="sum"><span class="small">換算台幣總額</span><b id="twdTotal">NT$0</b></div></div><div class="field"><label>匯率（1 台幣 = 幾韓元）</label><input id="rate" type="number" value="43"></div></section>
<section class="panel"><h2>新增記帳</h2><div class="grid"><div class="field"><label>記帳人</label><select id="payer"></select></div><div class="field"><label>幣別</label><select id="currency"><option value="KRW">韓元 KRW</option><option value="TWD">台幣 TWD</option></select></div></div><div class="field"><label>項目</label><input id="expenseName" placeholder="例如：豬肉湯飯"></div><div class="grid"><div class="field"><label>金額</label><input id="amount" type="number" inputmode="decimal"></div><div class="field"><label>分類</label><select id="category"><option>餐飲</option><option>交通</option><option>購物</option><option>住宿</option><option>景點</option><option>其他</option></select></div></div><button class="primary" id="addExpense">加入記帳</button></section>
<section class="panel"><h2>消費紀錄</h2><div id="expenseList" class="empty">目前沒有記帳</div></section>
</main>

<main id="weather" class="view"><section class="panel"><div class="small">釜山即時天氣</div><div class="weatherbig" id="temp">--°</div><div id="weatherText">讀取中…</div></section><section class="panel"><h2>未來 24 小時</h2><div class="cards" id="hourly"></div></section><section class="panel"><h2>7 天天氣</h2><div id="daily"></div></section></main>

<main id="transit" class="view"><section class="panel"><h2>AI 目的地建議</h2><div class="field"><label>你想去哪裡？</label><input id="destination" placeholder="例如：我要去膠囊列車"></div><div class="field"><label>目前位置</label><select id="origin"><option>西面</option><option>釜山站</option><option>海雲台</option><option>南浦洞</option><option>廣安里</option></select></div><button class="primary" id="routeBtn">幫我規劃</button><div id="routeResult"></div></section><section class="panel"><h2>附近景點與餐廳</h2><div class="row"><select id="nearbyArea" style="flex:1;height:48px;border-radius:14px;border:1px solid var(--line);padding:0 12px"><option>海雲台</option><option>西面</option><option>南浦洞</option><option>廣安里</option></select><button class="secondary" id="nearbyBtn">推薦</button></div><div id="nearbyResult"></div></section></main>
</div>
<nav class="tabs"><button class="on" data-view="wallet">💳<br>記帳</button><button data-view="weather">🌤️<br>天氣</button><button data-view="transit">🚇<br>交通</button></nav>

<div class="modal" id="tripModal"><div class="sheet"><button class="close" id="closeTrip">×</button><h2>共享旅行記帳</h2><p class="small">不用註冊 Email。建立旅程後，把房間碼或分享連結傳給同行的人即可。</p><div class="choice"><button class="on" data-mode="create">✨ 建立新旅程</button><button data-mode="join">🔗 加入旅程</button></div><div id="createBox"><div class="field"><label>旅程名稱</label><input id="newTripName" value="釜山之旅"></div><div class="field"><label>你的名字</label><input id="ownerName" placeholder="例如：小男"></div><div class="field"><label>管理 PIN（選填 4–8 位數）</label><input id="ownerPin" type="password" inputmode="numeric" placeholder="不設定也可以"></div><button class="primary" id="createTrip">建立旅程</button></div><div id="joinBox" class="hidden"><div class="field"><label>房間碼</label><input id="joinCode" placeholder="例如：BUSAN-5288"></div><div class="field"><label>你的名字</label><input id="joinName" placeholder="例如：媽媽"></div><div class="field"><label>個人 PIN（選填）</label><input id="joinPin" type="password" inputmode="numeric"></div><button class="primary" id="joinTrip">加入旅程</button></div><div id="shareBox" class="hidden"><div class="small" style="text-align:center">你的旅程房間碼</div><div class="code" id="roomCode"></div><button class="primary" id="shareLink">分享邀請連結</button><button class="secondary" style="width:100%;margin-top:8px" id="copyCode">複製房間碼</button><h2 style="margin-top:20px">旅行成員</h2><div id="memberList"></div><div class="field"><label>新增成員名稱</label><input id="memberName"></div><div class="field"><label>個人 PIN（選填）</label><input id="memberPin" type="password" inputmode="numeric"></div><button class="secondary" style="width:100%;margin-top:8px" id="addMember">新增成員</button></div><div class="notice" id="backendNotice">正式跨手機同步需要網站管理者先接好伺服器；一般使用者不會看到任何金鑰或後台設定。</div></div></div>
<script>
/* 部署者只需在此填一次，使用者介面不會顯示 */
const SUPABASE_URL='';
const SUPABASE_ANON_KEY='';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let db=null, state={trip:null,members:[],expenses:[],rate:43};
const serverReady=!!(SUPABASE_URL&&SUPABASE_ANON_KEY&&window.supabase);
if(serverReady) db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const key=c=>'busan_room_'+c;
const saveLocal=()=>{if(state.trip)localStorage.setItem(key(state.trip.code),JSON.stringify(state));renderAll()};
async function save(){saveLocal();if(!serverReady||!state.trip)return;await db.from('trip_rooms').upsert({code:state.trip.code,data:state,updated_at:new Date().toISOString()},{onConflict:'code'});}
async function loadRoom(code){if(serverReady){const {data}=await db.from('trip_rooms').select('data').eq('code',code).maybeSingle();if(data?.data)return data.data}try{return JSON.parse(localStorage.getItem(key(code)))}catch{return null}}
function roomCode(){return 'BUSAN-'+Math.floor(1000+Math.random()*9000)}
function esc(v=''){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderAll(){const connected=!!state.trip;$('#syncDot').classList.toggle('on',connected&&serverReady);$('#syncText').textContent=connected?(serverReady?'已連接「'+state.trip.name+'」':'已加入「'+state.trip.name+'」（本機預覽）'):'尚未加入共享旅程';$('#tripTitle').textContent=connected?state.trip.name+' · '+state.trip.code:'尚未建立旅程';$('#cloudNotice').textContent=connected?(serverReady?'所有成員手機會自動同步。':'目前為本機預覽；管理者接上伺服器後才會跨手機同步。'):'建立或加入旅程後，同行者可使用同一房間碼同步記帳。';$('#rate').value=state.rate||43;$('#payer').innerHTML=state.members.map(m=>`<option value="${m.id}">${esc(m.name)}${m.pin?' 🔒':''}</option>`).join('');$('#memberList').innerHTML=state.members.map(m=>`<div class="member"><div class="avatar">${m.pin?'🔒':'👤'}</div><div class="grow"><b>${esc(m.name)}</b><div class="small">${m.owner?'管理者':'成員'} · ${m.pin?'有 PIN':'無密碼'}</div></div>${m.owner?'':`<button class="danger" onclick="removeMember('${m.id}')">刪除</button>`}</div>`).join('');let krw=0,twd=0;state.expenses.forEach(e=>e.currency==='KRW'?krw+=+e.amount:twd+=+e.amount);$('#krwTotal').textContent='₩'+Math.round(krw).toLocaleString();$('#twdTotal').textContent='NT$'+Math.round(twd+krw/(state.rate||43)).toLocaleString();$('#expenseList').innerHTML=state.expenses.length?[...state.expenses].reverse().map(e=>{const m=state.members.find(x=>x.id===e.member);return `<div class="item"><div>🧾</div><div class="grow"><b>${esc(e.name)}</b><div class="small">${esc(m?.name||'')} · ${e.category}</div></div><b>${e.currency==='KRW'?'₩':'NT$'}${(+e.amount).toLocaleString()}</b></div>`}).join(''):'<div class="empty">目前沒有記帳</div>'}
$$('.tabs button').forEach(b=>b.onclick=()=>{$$('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');$$('.view').forEach(v=>v.classList.remove('on'));$('#'+b.dataset.view).classList.add('on')});
$('#syncOpen').onclick=$('#manageTrip').onclick=()=>{$('#tripModal').classList.add('show');if(state.trip){$('#createBox').classList.add('hidden');$('#joinBox').classList.add('hidden');$('#shareBox').classList.remove('hidden');$('#roomCode').textContent=state.trip.code;renderAll()}};$('#closeTrip').onclick=()=>$('#tripModal').classList.remove('show');
$$('[data-mode]').forEach(b=>b.onclick=()=>{$$('[data-mode]').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('#createBox').classList.toggle('hidden',b.dataset.mode!=='create');$('#joinBox').classList.toggle('hidden',b.dataset.mode!=='join');$('#shareBox').classList.add('hidden')});
$('#createTrip').onclick=async()=>{const name=$('#ownerName').value.trim();if(!name)return alert('請輸入你的名字');const pin=$('#ownerPin').value.trim();if(pin&&!/^\d{4,8}$/.test(pin))return alert('PIN 請輸入 4–8 位數字');state={trip:{code:roomCode(),name:$('#newTripName').value.trim()||'釜山之旅'},members:[{id:crypto.randomUUID(),name,pin,owner:true}],expenses:[],rate:43};await save();$('#roomCode').textContent=state.trip.code;$('#createBox').classList.add('hidden');$('#shareBox').classList.remove('hidden')};
$('#joinTrip').onclick=async()=>{const code=$('#joinCode').value.trim().toUpperCase(),name=$('#joinName').value.trim();if(!code||!name)return alert('請輸入房間碼與名字');const found=await loadRoom(code);if(!found)return alert(serverReady?'找不到這個旅程房間':'目前尚未連接正式伺服器，無法跨手機加入');state=found;if(!state.members.some(m=>m.name===name))state.members.push({id:crypto.randomUUID(),name,pin:$('#joinPin').value.trim(),owner:false});await save();$('#tripModal').classList.remove('show');renderAll()};
$('#addMember').onclick=async()=>{const name=$('#memberName').value.trim();if(!name)return;state.members.push({id:crypto.randomUUID(),name,pin:$('#memberPin').value.trim(),owner:false});$('#memberName').value='';$('#memberPin').value='';await save()};window.removeMember=async id=>{state.members=state.members.filter(m=>m.id!==id);state.expenses=state.expenses.filter(e=>e.member!==id);await save()};
$('#copyCode').onclick=()=>navigator.clipboard.writeText(state.trip.code);$('#shareLink').onclick=async()=>{const url=location.origin+location.pathname+'?room='+encodeURIComponent(state.trip.code);if(navigator.share)await navigator.share({title:state.trip.name,text:'加入我的釜山旅行記帳',url});else navigator.clipboard.writeText(url)};
$('#addExpense').onclick=async()=>{if(!state.trip)return alert('請先建立或加入旅程');const name=$('#expenseName').value.trim(),amount=+$('#amount').value;if(!name||amount<=0)return alert('請輸入項目與金額');state.expenses.push({id:crypto.randomUUID(),member:$('#payer').value,name,amount,currency:$('#currency').value,category:$('#category').value,at:new Date().toISOString()});$('#expenseName').value='';$('#amount').value='';await save()};$('#rate').onchange=async()=>{state.rate=+$('#rate').value||43;await save()};
const nearby={海雲台:[['海雲台海水浴場','해운대해수욕장'],['天空膠囊尾浦站','해운대블루라인파크 미포정거장'],['錦繡河豚湯','금수복국 해운대본점'],['海雲台傳統市場','해운대전통시장']],西面:[['田浦咖啡街','전포카페거리'],['松亭三代豬肉湯飯','송정3대국밥'],['釜山市民公園','부산시민공원']],南浦洞:[['札嘎其市場','자갈치시장'],['BIFF廣場','BIFF광장'],['元祖漢陽豬腳','원조한양족발']],廣安里:[['廣安里海水浴場','광안리해수욕장'],['民樂生魚片中心','민락회타운'],['Millac the Market','밀락더마켓']]};
$('#nearbyBtn').onclick=()=>{$('#nearbyResult').innerHTML=(nearby[$('#nearbyArea').value]||[]).map(x=>`<div class="recommend"><b>${x[0]}</b><div class="small">點開 NAVER Map 查看目前位置的步行或大眾運輸路線</div><a target="_blank" href="https://map.naver.com/p/search/${encodeURIComponent(x[1])}">開啟 NAVER Map →</a></div>`).join('')};
const routes={膠囊列車:{station:'海雲台站',text:'搭到海雲台站後，從 3 號出口前往尾浦站；步行約 20–25 分鐘，帶小孩可改搭計程車約 5–10 分鐘。',q:'해운대블루라인파크 미포정거장'},海雲台:{station:'海雲台站',text:'西面搭 2 號線直達海雲台，不需轉乘。',q:'해운대해수욕장'},甘川文化村:{station:'土城站',text:'搭 1 號線到土城站，再轉社區巴士或計程車上山。',q:'감천문화마을'}};
$('#routeBtn').onclick=()=>{const s=$('#destination').value;const k=Object.keys(routes).find(k=>s.includes(k))||'海雲台',r=routes[k];$('#routeResult').innerHTML=`<div class="recommend"><b>${r.station}</b><p>${r.text}</p><a target="_blank" href="https://map.naver.com/p/search/${encodeURIComponent(r.q)}">用 NAVER Map 導航 →</a></div>`};
async function weather(){try{const u='https://api.open-meteo.com/v1/forecast?latitude=35.1796&longitude=129.0756&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul';const j=await fetch(u).then(r=>r.json());$('#temp').textContent=Math.round(j.current.temperature_2m)+'°';$('#weatherText').textContent=j.current.weather_code>=51?'有雨，記得帶傘':j.current.weather_code>=3?'多雲':'晴朗';$('#hourly').innerHTML=j.hourly.time.slice(0,24).map((t,i)=>`<div class="hour"><div class="small">${new Date(t).getHours()}:00</div><b>${Math.round(j.hourly.temperature_2m[i])}°</b><div class="small">雨 ${j.hourly.precipitation_probability[i]}%</div></div>`).join('');$('#daily').innerHTML=j.daily.time.map((d,i)=>`<div class="item"><div class="grow"><b>${new Date(d).toLocaleDateString('zh-TW',{weekday:'short',month:'numeric',day:'numeric'})}</b></div><b>${Math.round(j.daily.temperature_2m_min[i])}°–${Math.round(j.daily.temperature_2m_max[i])}°</b></div>`).join('')}catch{$('#weatherText').textContent='天氣讀取失敗'}}weather();
(async()=>{const room=new URLSearchParams(location.search).get('room');if(room){$('#tripModal').classList.add('show');$$('[data-mode]').forEach(x=>x.classList.toggle('on',x.dataset.mode==='join'));$('#createBox').classList.add('hidden');$('#joinBox').classList.remove('hidden');$('#joinCode').value=room}renderAll()})();
</script></body></html>
